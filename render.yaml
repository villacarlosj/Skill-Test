databases:
  - name: ratehorse-db
    databaseName: ratehorse
    user: ratehorse
    plan: free

services:
  - type: web
    name: ratehorse
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    port: 8080
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Ratehorse
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://ratehorse.onrender.com   # change to your Render URL

      # Database — Render auto-links these from the database above
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ratehorse-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ratehorse-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ratehorse-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ratehorse-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ratehorse-db
          property: password

      # Session & cache (DB-backed, no Redis needed on free plan)
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: 120
      - key: SESSION_ENCRYPT
        value: true
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

      # External services
      - key: FRANKFURTER_BASE_URL
        value: https://api.frankfurter.app
      - key: FRANKFURTER_TIMEOUT
        value: 10

      # Logging — pipe to stdout so Render shows it
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
